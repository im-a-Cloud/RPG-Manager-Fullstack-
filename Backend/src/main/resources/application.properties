# ============================================
# APPLICATION NAME
# ============================================
spring.application.name=RPG_Manager2.0

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080

# ============================================
# ERROR HANDLING (Suas configuraÁıes)
# ============================================
# Spring Boot 4.x - Remove o stack trace
server.error.include-stacktrace=never

# Spring Boot 4.x - Remove binding errors
server.error.include-binding-errors=never

# Desabilita o trace completamente
spring.mvc.log-resolved-exception=false

# Resposta de erro minimalista
server.error.whitelabel.enabled=false

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ConfiguraÁıes adicionais do Hibernate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ============================================
# CORS CONFIGURATION (NECESS¡RIO PARA ANGULAR)
# ============================================
# URLs permitidas para o frontend
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# ============================================
# LOGGING
# ============================================
# NÌvel de log para sua aplicaÁ„o
logging.level.com.rpg=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# Formato do log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# JACKSON (JSON Serialization)
# ============================================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.fail-on-empty-beans=false

# ============================================
# FILE UPLOAD (Se precisar depois)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# DEVTOOLS (Opcional - para desenvolvimento)
# ============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ============================================
# SPRING DOC (Swagger/OpenAPI - Opcional)
# ============================================
# springdoc.api-docs.path=/api-docs
# springdoc.swagger-ui.path=/swagger-ui.html